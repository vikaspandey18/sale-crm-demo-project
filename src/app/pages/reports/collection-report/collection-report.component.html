@if (error$ | async; as error) {
<div class="alertMessage">
  <app-alert variant="error" title="Failed To Fetch Collection Report" [message]="error" />
</div>
}

<button type="button" (click)="clearFilters()"
  class="inline-flex items-center justify-center gap-2 rounded-lg transition px-2 py-1 text-sm bg-white text-gray-700 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-400 dark:ring-gray-700 dark:hover:bg-white/[0.03] dark:hover:text-gray-300">Clear
  Filters</button>

<ag-grid-angular class="ag-theme-quartz" style="width: 100%; height: 500px;margin-top: 10px;" [theme]="theme"
  [rowData]="customers$ | async" [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [pagination]="true"
  [paginationPageSize]="100" [loading]="loading$ | async" (gridReady)="onGridReady($event)">
</ag-grid-angular>
