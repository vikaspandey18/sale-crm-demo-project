@if (error$ | async; as error) {
<div class="alertMessage">
    <app-alert variant="error" title="Failed To Fetch Detail Report" [message]="error" />
</div>
}

<ag-grid-angular class="ag-theme-quartz" style="width: 100%; height: 700px"
    [theme]="(gridTheme$ | async) ?? themeAlpine" [rowData]="detailReport$ | async" [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef" [pagination]="true" [paginationPageSize]="100"
    [paginationPageSizeSelector]="[100, 250, 500, 1000]" [loading]="loading$ | async">
</ag-grid-angular>
