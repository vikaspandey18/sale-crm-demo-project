<!-- Modal -->
<app-modal [isOpen]="isOpen" (close)="closeModal()" className="max-w-[700px] m-4">
    <div
        class="no-scrollbar relative w-full max-w-[700px] overflow-y-auto rounded-3xl bg-white p-2 dark:bg-gray-900 lg:p-11">
        <h5 class="mb-5 text-md font-medium text-gray-600 dark:text-white/90 lg:mb-6">
            Add Lead Status
        </h5>
        <div class="max-w-full overflow-x-auto">
            <div class="space-y-6 dark:border-gray-800">

                @if(error){
                <p class="mt-1 text-xs text-red-500">{{ error }}</p>
                }
                @if(success){
                <p class="mt-1 text-xs text-green-500">{{ success }}</p>
                }


                <form [formGroup]="addLeadForm" (ngSubmit)="onSubmit()">
                    <div class="-mx-2.5 flex flex-wrap gap-y-5">

                        <div class="w-full px-2.5">
                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                Status
                            </label>

                            <div class="relative">
                                <select
                                    class="appearance-none bg-gray-50 bg-transparent border border-gray-300 dark:bg-gray-800 dark:bg-gray-900 dark:border-gray-700 dark:focus:border-brand-800 dark:placeholder:text-white/30 dark:text-gray-400 dark:text-white/90 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 h-11 placeholder:text-gray-400 pr-11 px-4 py-2.5 rounded-lg shadow-theme-xs text-gray-400 text-sm w-full"
                                    formControlName="status">
                                    <option value="" disabled=""
                                        class="text-gray-700 dark:bg-gray-900 dark:text-gray-400">
                                        Select an Status
                                    </option>
                                    <option class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" value="Pending">
                                        Pending </option>
                                    <option class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" value="Rejected">
                                        Rejected </option>
                                    <option class="text-gray-700 dark:bg-gray-900 dark:text-gray-400" value="Completed">
                                        Completed </option><!---->
                                </select>
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="absolute text-gray-700 dark:text-gray-400 right-3 top-1/2 -translate-y-1/2 pointer-events-none">
                                    <path d="M4.79175 8.02075L10.0001 13.2291L15.2084 8.02075" stroke="currentColor"
                                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                                </svg>
                            </div>

                        </div>



                        <div class="w-full px-2.5">
                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                Comment
                            </label>
                            <textarea placeholder="Enter your message" rows="2"
                                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                                formControlName="comment"></textarea>
                        </div>

                        <div class="w-full px-2.5">
                            <button type="submit"
                                class="bg-brand-500 hover:bg-brand-600 flex w-full items-center justify-center gap-2 rounded-lg p-3 text-sm font-medium text-white transition-colors"
                                [disabled]="this.addLeadForm.invalid || loading">
                                {{ loading ? " Loading.... " : "Send Message" }}

                                @if (!loading) {
                                <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path fill-rule="evenodd" clip-rule="evenodd"
                                        d="M4.98481 2.44399C3.11333 1.57147 1.15325 3.46979 1.96543 5.36824L3.82086 9.70527C3.90146 9.89367 3.90146 10.1069 3.82086 10.2953L1.96543 14.6323C1.15326 16.5307 3.11332 18.4291 4.98481 17.5565L16.8184 12.0395C18.5508 11.2319 18.5508 8.76865 16.8184 7.961L4.98481 2.44399ZM3.34453 4.77824C3.0738 4.14543 3.72716 3.51266 4.35099 3.80349L16.1846 9.32051C16.762 9.58973 16.762 10.4108 16.1846 10.68L4.35098 16.197C3.72716 16.4879 3.0738 15.8551 3.34453 15.2223L5.19996 10.8853C5.21944 10.8397 5.23735 10.7937 5.2537 10.7473L9.11784 10.7473C9.53206 10.7473 9.86784 10.4115 9.86784 9.99726C9.86784 9.58304 9.53206 9.24726 9.11784 9.24726L5.25157 9.24726C5.2358 9.20287 5.2186 9.15885 5.19996 9.11528L3.34453 4.77824Z"
                                        fill=""></path>
                                </svg>
                                }
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</app-modal>
