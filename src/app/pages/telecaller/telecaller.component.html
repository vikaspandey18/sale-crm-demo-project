@if (error$ | async; as error) {
  <div class="alertMessage">
    <app-alert
      variant="error"
      title="Failed To Fetch Telecaller Customer"
      [message]="error"
    />
  </div>
}

<ag-grid-angular
  class="ag-theme-quartz"
  style="width: 100%; height: 500px"
  [theme]="theme"
  [rowData]="customers$ | async"
  [columnDefs]="columnDefs"
  [defaultColDef]="defaultColDef"
  [pagination]="true"
  [paginationPageSize]="500"
  [paginationPageSizeSelector]="[100, 250, 500, 1000]"
  [loading]="loading$ | async"
  (cellValueChanged) = "onCellValueChanged($event)"
>
</ag-grid-angular>

<!-- Modal -->
<app-modal
  [isOpen]="isOpen"
  (close)="closeModal()"
  className="max-w-[700px] m-4"
>
  <div
    class="no-scrollbar relative w-full max-w-[700px] overflow-y-auto rounded-3xl bg-white p-2 dark:bg-gray-900 lg:p-11"
  >
    <form
      
      class="flex flex-col"
      (ngSubmit)="handleSave()"
    >
      <div class="custom-scrollbar h-[450px] overflow-y-auto px-2 pb-3">
        <div class="">
          <h5
            class="mb-5 text-lg font-medium text-gray-800 dark:text-white/90 lg:mb-6"
          >
            Customer Details
          </h5>
          <div class="grid grid-cols-1 gap-x-6 gap-y-5 lg:grid-cols-2">
            <div class="col-span-2 lg:col-span-1">
              <label>Customer Name</label>
              <app-input-field type="text"  />
            </div>
            <div class="col-span-2 lg:col-span-1">
              <label>Last Name</label>
              <app-input-field type="text" [value]="user.lastName" />
            </div>
            <div class="col-span-2 lg:col-span-1">
              <label>Email Address</label>
              <app-input-field type="text" [value]="user.email" />
            </div>
            <div class="col-span-2 lg:col-span-1">
              <label>Phone</label>
              <app-input-field type="text" [value]="user.phone" />
            </div>
            <div class="col-span-2">
              <label>Bio</label>
              <app-input-field type="text" [value]="user.bio" />
            </div>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3 px-2 mt-6 lg:justify-end">
        <app-button size="sm" variant="outline" (btnClick)="closeModal()">
          Close
        </app-button>
        <app-button size="sm" (btnClick)="handleSave()">
          Save Changes
        </app-button>
      </div>
    </form>
  </div>
</app-modal>
