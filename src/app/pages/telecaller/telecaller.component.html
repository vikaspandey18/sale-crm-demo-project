@if (error$ | async; as error) {
  <app-alert variant="error" title="Authentication Failed" [message]="error" />
}

<ag-grid-angular
  class="ag-theme-quartz"
  style="width: 100%; height: 500px"
  [theme]="theme"
  [rowData]="customers$ | async"
  [columnDefs]="columnDefs"
  [pagination]="true"
  [paginationPageSize]="100"
  [loading]="loading$ | async"
>
</ag-grid-angular>
